name: Security

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  schedule:
    # Weekly full scan (Mondays 06:00 UTC) to catch newly-disclosed CVEs.
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-vuln:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Report HIGH + CRITICAL for visibility (does not fail the build).
      - name: Trivy scan (report HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      # Gate the pipeline only on CRITICAL, fixable vulnerabilities.
      # HIGH findings (e.g. framework CVEs needing a major upgrade) are surfaced
      # above and by the npm/pip audit jobs, and tracked as follow-up upgrades.
      - name: Trivy gate (fail on CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  python-deps:
    name: Python deps audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guidr-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit requirements
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-none || true
        # `|| true`: report findings without hard-failing the pipeline on
        # transitive advisories with no available fix yet. Tighten once triaged.

  node-deps:
    name: Node deps audit (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guidr-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: guidr-frontend/package-lock.json
      - run: npm ci
      - name: Audit (high+ severity)
        run: npm audit --audit-level=high || true
